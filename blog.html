<!DOCTYPE html>
<head>
    <meta charset="en"/>
    <meta name="author" content="Toast Bajortski">
    <title>gallery</title>
    <link rel="stylesheet" href="stylesheet.css"/>
    <link rel="icon" type="image/x-icon" href="MuppeToast-BandW.svg"/>
    <script>
        function parseStatuses(markdown) {
            return markdown
                .split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);
        }
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        fetch('https://raw.githubusercontent.com/Bajortski/bajortski.github.io/refs/heads/main/statuses.md')
            .then(response => response.text())
            .then(markdown => {
                const statuses = parseStatuses(markdown);
                shuffle(statuses);
                const space = '&nbsp;'.repeat(4);
                const joined = space + statuses.join('  -  ');
                document.getElementById('markdown-content').innerHTML = joined;
            });
        fetch('https://raw.githubusercontent.com/Bajortski/bajortski.github.io/refs/heads/main/version.md')
            .then(response => response.text())
            .then(version => {
                const versionCell = document.getElementById('version-cell');
                if (versionCell) {
                    versionCell.textContent = version.trim();
                }
            });
    </script>
</head>
<body> 
  <div class="container">
    <div class="content">
      <table class="header">
        <tr>
          <td colspan="5" rowspan="1" class="width-auto">
            <h1 class="title"><a class="no-underline" href="index.html">bajortski.net</a></h1>
          </td>
          <th>version</th>
          <td class="width-min" id="version-cell"></td>
        </tr>
        <tr>
          <td colspan="7">
            <div class="marquee" class="marquee-header">
              <p id="markdown-content"></p>
            </div>
          </td>
        </tr>
      </table> 
      <ul class="tree">
        <li>
          <p style="margin: 0;">
            <strong>/blog</strong>
          </p>
          <ul class="incremental">
            <li>
              <a href="on-artistic-freedom.html">on artistic freedom in video games</a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</body>
