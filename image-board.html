<!DOCTYPE html>
<head>
  <meta charset="en"/>
  <meta name="author" content="Toast Bajortski">
  <title>gallery</title>
  <link rel="stylesheet" href="stylesheet.css"/>
  <link rel="icon" type="image/x-icon" href="images/muppet-header.svg"/>
  <script src="script.js"></script>
</head>
<body>
  <div class="container">
    <div class="content">
      <div id="site-header"></div>
      <table>
        <tr>
          <th colspan="2" rowspan="1">
            <h1>Vectors</h1>
          </th>
          <td colspan="5" rowspan="1">
            <p>A collection of random vector images made for no reason.</p>
          </td>
        </tr>
        <tr>
          <td colspan="3" rowspan="2">
            <img src="images/Meat Cleaver.svg" height="400" alt="Meat Cleaver" />
          </td>
          <th colspan="1" rowspan="1">
            <img src="images/Winning Personality.svg" height="200" alt="Winning Personality" />
          </th>
        </tr>
        <tr>
          <td colspan="1" rowspan="1">
            <img src="images/Wine-glass.svg" height="200" alt="Wine Glass" />
          </td>
        </tr>
        <tr>
          <th colspan="2" rowspan="1">
            <img src="images/MuppeToast.svg" height="200" alt="A Turquoise Muppet with curly dark brown hair, glasses and a pink beanie." />
          </th>
          <td colspan="2" rowspan="1">
            <img src="MuppeToast-BandW.svg" height="200" alt="A black and white Muppet with curly hair, glasses and a beanie" />
          </td>
        </tr>
        <tr>
          <th colspan="4">
            <img src="images/ELEMENTARY-MATHEMATICS.svg" height="600" alt="A mathematics textbook cover" />
          </th>
        </tr>
      </table>
    </div>
  </div>
</body>
