<!DOCTYPE html>
<head>

<body>
  <div class="container">
    <div class="content">

          <td colspan="5" rowspan="1" class="width-auto">

          <th>version</th>
          <td class="width-min" id="version-cell"></td>

            <div class="marquee" class="marquee-header">
              <p id="markdown-content"></p>

        </tr>

          <th colspan="2" rowspan="1">
            <img src="MuppeToast.svg" height="200" alt="A Turquoise Muppet with curly dark brown hair, glasses and a pink beanie." />
          </th>
          <td colspan="2" rowspan="1">
            <img src="MuppeToast-BandW.svg" height="200" alt="A black and white Muppet with curly hair, glasses and a beanie" />
          </td>
        </tr>
        <tr>
          <th colspan="4">
            <img src="ELEMENTARY-MATHEMATICS.svg" height="600" alt="A mathematics textbook cover" />
          </th>
        </tr>
